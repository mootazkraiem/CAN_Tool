<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Showcase</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            background: #171313 !important;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 46%, rgba(255,255,255,0.03), rgba(0,0,0,0) 22%),
                radial-gradient(circle at 50% 50%, #211c1c 0%, #141010 62%, #0d0a0a 100%);
        }
        canvas {
            display: block;
            background: transparent !important;
        }
    </style>
    <script src="./vendor/three.min.js"></script>
    <script src="./vendor/GLTFLoader.js"></script>
    <script src="./vendor/OrbitControls.js"></script>
</head>
<body>
    <script>
        window.viewerReady = false;
        let scene, camera, renderer, controls, car;
        const presetViews = [
            [-4.9, 3.25, 4.8],
            [4.9, 3.25, 4.8],
            [0.0, 2.85, 6.2],
            [0.0, 4.4, -5.4],
        ];
        let presetIndex = 0;
        let pointerDown = null;
        let carCenterY = 0.28;

        function getModelUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('model_url') || './toyota_supra_mk4_a80.glb';
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x171313);
            scene.fog = new THREE.Fog(0x171313, 11, 20);

            camera = new THREE.PerspectiveCamera(34, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(...presetViews[0]);

            renderer = new THREE.WebGLRenderer({
                alpha: true,
                antialias: true,
                preserveDrawingBuffer: false,
                powerPreference: 'high-performance'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x171313, 1);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.physicallyCorrectLights = true;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
            renderer.domElement.style.background = '#171313';
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.autoRotate = false;
            controls.enableRotate = true;
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.screenSpacePanning = false;
            controls.minDistance = 3.8;
            controls.maxDistance = 8.4;
            controls.rotateSpeed = 0.92;
            controls.zoomSpeed = 0.95;
            controls.mouseButtons = {
                LEFT: THREE.MOUSE.ROTATE,
                MIDDLE: THREE.MOUSE.DOLLY,
                RIGHT: THREE.MOUSE.ROTATE,
            };
            controls.minPolarAngle = Math.PI * 0.18;
            controls.maxPolarAngle = Math.PI * 0.68;
            controls.minAzimuthAngle = -Infinity;
            controls.maxAzimuthAngle = Infinity;

            const hemi = new THREE.HemisphereLight(0xe9e0f6, 0x0a090a, 0.78);
            scene.add(hemi);

            const key = new THREE.DirectionalLight(0xffffff, 2.25);
            key.position.set(4.2, 6.8, 5.2);
            key.castShadow = true;
            key.shadow.mapSize.width = 2048;
            key.shadow.mapSize.height = 2048;
            key.shadow.camera.near = 0.5;
            key.shadow.camera.far = 20;
            key.shadow.camera.left = -6;
            key.shadow.camera.right = 6;
            key.shadow.camera.top = 6;
            key.shadow.camera.bottom = -6;
            key.shadow.bias = -0.0002;
            scene.add(key);

            const fill = new THREE.DirectionalLight(0x8f72d8, 0.72);
            fill.position.set(-4.6, 2.8, 4.0);
            scene.add(fill);

            const rim = new THREE.DirectionalLight(0xffffff, 0.65);
            rim.position.set(-2.0, 3.5, -5.4);
            scene.add(rim);

            const shadowPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.ShadowMaterial({
                    color: 0x000000,
                    transparent: true,
                    opacity: 0.22,
                })
            );
            shadowPlane.rotation.x = -Math.PI / 2;
            shadowPlane.position.y = -0.54;
            shadowPlane.receiveShadow = true;
            scene.add(shadowPlane);

            // Load Model
            const loader = new THREE.GLTFLoader();
            loader.load(getModelUrl(), function(gltf) {
                car = gltf.scene;

                car.traverse(function(obj) {
                    if (obj.isMesh) {
                        obj.castShadow = true;
                        obj.receiveShadow = true;
                    }
                });

                const box = new THREE.Box3().setFromObject(car);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z) || 1;

                car.position.sub(center);
                const scale = 3.15 / maxDim;
                car.scale.setScalar(scale);
                const scaledHeight = size.y * scale;
                car.position.y += scaledHeight * 0.01;
                scene.add(car);
                carCenterY = Math.max(0.1, scaledHeight * 0.14);
                controls.target.set(0, carCenterY, 0);
                controls.update();
                window.viewerReady = true;
            }, undefined, function(error) {
                console.error("Error loading Supra:", error);
                window.viewerReady = false;
            });

            renderer.domElement.addEventListener('pointerdown', function(event) {
                pointerDown = { x: event.clientX, y: event.clientY };
            });

            renderer.domElement.addEventListener('pointerup', function(event) {
                if (!pointerDown) return;
                const dx = event.clientX - pointerDown.x;
                const dy = event.clientY - pointerDown.y;
                if (Math.hypot(dx, dy) < 6) {
                    cycleView();
                }
                pointerDown = null;
            });

            window.addEventListener('keydown', onKeyDown, false);

            window.addEventListener('resize', onWindowResize, false);
        }

        function cycleView() {
            presetIndex = (presetIndex + 1) % presetViews.length;
            camera.position.set(...presetViews[presetIndex]);
            controls.target.set(0, carCenterY, 0);
            controls.update();
        }

        window.focusHudZone = function(zone) {
            if (!camera || !controls) return;
            if (zone === 'left') {
                camera.position.set(-4.9, 3.25, 4.8);
            } else if (zone === 'right') {
                camera.position.set(4.9, 3.25, 4.8);
            } else {
                camera.position.set(0.0, 2.85, 6.2);
            }
            controls.target.set(0, carCenterY, 0);
            controls.update();
        };

        function onKeyDown(event) {
            if (!controls) return;
            let handled = true;
            switch (event.key.toLowerCase()) {
                case 'c':
                    cycleView();
                    break;
                case 'home':
                    presetIndex = 0;
                    camera.position.set(...presetViews[0]);
                    controls.target.set(0, carCenterY, 0);
                    controls.update();
                    break;
                default:
                    handled = false;
                    break;
            }
            if (handled) {
                event.preventDefault();
                controls.update();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
